<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPCFlix Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Set this to your deployed backend URL before auth-client.js loads -->
    <script>window.SPC_API_BASE = window.SPC_API_BASE || 'https://spc-unblockers-backend.onrender.com';</script>
    <script src="auth-client.js"></script>
    <style>
        .breadcrumb {
            margin: 0 2rem 1rem;
            padding: 0.5rem 0;
            display: flex; align-items: center; gap: 0.5rem;
            color: var(--text-muted); font-size: 0.88rem;
        }
        .breadcrumb a { color: var(--primary); text-decoration: none; transition: 0.15s; }
        .breadcrumb a:hover { color: #e50914; }
        .breadcrumb span { opacity: 0.4; }

        /* Player card */
        .player-card {
            margin: 0 2rem 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .player-iframe-wrap {
            width: 100%; height: 72vh; min-height: 520px;
            background: #000; position: relative;
        }
        #flixIframe {
            width: 100%; height: 100%; border: none; display: block;
        }
        .player-loading {
            position: absolute; inset: 0;
            background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 5; gap: 1rem;
            transition: opacity 0.3s;
        }
        .player-loading .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(229,9,20,0.3);
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .player-loading p { color: rgba(255,255,255,0.6); font-size: 0.9rem; }

        /* Info bar below player */
        .player-info-bar {
            padding: 1rem 1.5rem;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.25);
            border-top: 1px solid var(--border);
            gap: 1rem; flex-wrap: wrap;
        }
        .player-title-block h1 {
            font-size: 1.4rem; font-weight: 800; margin-bottom: 0.2rem;
        }
        .player-title-block .meta {
            display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;
            font-size: 0.82rem;
        }
        .player-title-block .meta .rating { color: #f5c518; font-weight: 700; }
        .player-title-block .meta .dim { color: var(--text-muted); }
        .player-title-block .meta .badge {
            padding: 0.15rem 0.5rem; border-radius: 4px;
            font-size: 0.65rem; font-weight: 900; letter-spacing: 1px;
        }
        .badge-movie  { background: #e50914; color: #fff; }
        .badge-series { background: #0f89ca; color: #fff; }
        .badge-anime  { background: #7c3aed; color: #fff; }

        .player-actions { display: flex; gap: 0.75rem; align-items: center; }
        .btn-icon-flix {
            width: 42px; height: 42px; border-radius: var(--radius-md);
            background: rgba(255,255,255,0.07); border: 1px solid var(--border);
            color: var(--text-main); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-icon-flix:hover {
            background: linear-gradient(135deg, #e50914, #b00710);
            border-color: #e50914;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(229,9,20,0.4);
        }

        /* Episode picker section */
        .ep-section {
            margin: 1.5rem 2rem 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .ep-section-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 700; font-size: 1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .ep-section-header span { color: #e50914; }
        .ep-body { padding: 1rem 1.5rem 1.5rem; }

        .season-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; }
        .season-row { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
        .s-btn {
            padding: 0.3rem 0.9rem; border-radius: 5px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.04);
            color: var(--text-muted); font-size: 0.82rem; font-weight: 600;
            cursor: pointer; transition: 0.15s; font-family: 'Outfit', sans-serif;
        }
        .s-btn.active, .s-btn:hover { background: #e50914; color: #fff; border-color: #e50914; }

        .ep-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 0.4rem; }
        .e-btn {
            padding: 0.4rem 0.2rem; border-radius: 6px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.04);
            color: var(--text-muted); font-size: 0.8rem; font-weight: 600;
            cursor: pointer; text-align: center; transition: 0.15s; font-family: 'Outfit', sans-serif;
        }
        .e-btn.active, .e-btn:hover { background: #e50914; color: #fff; border-color: #e50914; }

        /* Description section */
        .desc-section {
            margin: 1.5rem 2rem 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.2rem 1.5rem;
        }
        .desc-section h3 { font-size: 0.85rem; font-weight: 800; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.6rem; }
        .desc-section p { color: rgba(255,255,255,0.75); font-size: 0.9rem; line-height: 1.7; }

        @media (max-width: 768px) {
            .breadcrumb, .player-card, .ep-section, .desc-section { margin-left: 1rem; margin-right: 1rem; }
            .player-iframe-wrap { height: 56vw; min-height: 240px; }
            .player-info-bar { flex-direction: column; align-items: flex-start; }
            .player-title-block h1 { font-size: 1.1rem; }
        }

        /* ── SPCFlix player: overlay sidebar ── */
        .app-container { display: block !important; }
        .sidebar {
            position: fixed !important;
            left: -280px !important;
            top: 0 !important;
            height: 100vh !important;
            width: 260px !important;
            z-index: 500 !important;
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1) !important;
            box-shadow: none;
        }
        .sidebar.flix-open {
            left: 0 !important;
            box-shadow: 4px 0 40px rgba(0,0,0,0.7) !important;
        }
        .sidebar-overlay {
            display: block !important;
            position: fixed !important;
            inset: 0 !important;
            background: rgba(0,0,0,0.6) !important;
            backdrop-filter: blur(4px) !important;
            z-index: 499 !important;
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.3s !important;
        }
        .sidebar-overlay.flix-active {
            opacity: 1 !important;
            pointer-events: auto !important;
        }
        .main-content { margin-left: 0 !important; width: 100% !important; }
        .top-nav { position: sticky; top: 0; z-index: 100; }
    </style>
</head>

                <span>Anime</span>
            </a>
        </nav>
    </aside>
    <div class="sidebar-overlay"></div>

    <main class="main-content">
        <header class="top-nav">
            <button class="menu-toggle" id="menu-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div style="display:flex;align-items:center;gap:.3rem;margin-left:.5rem;">
                <span style="font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:#e50914;">SPC</span>
                <span style="font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:900;color:#fff;">FLIX</span>
            </div>
            <div style="margin-left:auto;"></div>
        </header>

        <div class="breadcrumb">
            <a href="spcflix.html">SPCFlix</a>
            <span>/</span>
            <span id="breadcrumbTitle">Loading...</span>
        </div>

        <!-- Main player -->
        <div class="player-card">
            <div class="player-iframe-wrap">
                <div class="player-loading" id="playerLoading">
                    <div class="spinner"></div>
                    <p>Loading...</p>
                </div>
                <iframe id="flixIframe" allowfullscreen allow="autoplay; fullscreen; encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"></iframe>
            </div>
            <div class="player-info-bar">
                <div class="player-title-block">
                    <h1 id="playerTitle">—</h1>
                    <div class="meta">
                        <span class="badge" id="playerBadge"></span>
                        <span class="rating" id="playerRating"></span>
                        <span class="dim" id="playerYear"></span>
                        <span class="dim" id="playerGenre"></span>
                    </div>
                </div>
                <div class="player-actions">
                    <button class="btn-icon-flix" id="btnFullscreen" title="Fullscreen">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                    </button>
                    <button class="btn-icon-flix" id="btnRefresh" title="Reload player">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Episode picker (series/anime only) -->
        <div class="ep-section" id="epSection" style="display:none;">
            <div class="ep-section-header">📺 <span>Episodes</span></div>
            <div class="ep-body">
                <div class="season-label">Season</div>
                <div class="season-row" id="seasonRow"></div>
                <div class="season-label">Episode</div>
                <div class="ep-row" id="epRow"></div>
            </div>
        </div>

        <!-- Description -->
        <div class="desc-section">
            <h3>About</h3>
            <p id="playerDesc">—</p>
        </div>
    </main>
</div>

let item = null;
let activeSeason = 1;
let activeEp = 1;

function getURL() {
    if (!item) return '';
    if (item.type === 'movie') return item.url;
    return item.urlTemplate.replace('{season}', activeSeason).replace('{episode}', activeEp);
}

function loadPlayer() {
    const iframe = document.getElementById('flixIframe');
    const loading = document.getElementById('playerLoading');
    loading.style.opacity = '1';
    loading.style.pointerEvents = 'auto';
    iframe.src = '';
    setTimeout(() => {
        iframe.src = getURL();
        iframe.onload = () => {
            loading.style.opacity = '0';
            loading.style.pointerEvents = 'none';
        };
        // Fallback hide loading after 5s
        setTimeout(() => { loading.style.opacity = '0'; loading.style.pointerEvents = 'none'; }, 5000);
    }, 80);
}

function buildSeasons() {
    const row = document.getElementById('seasonRow');
    row.innerHTML = Array.from({length: item.seasons}, (_,i) =>
        `<button class="s-btn${i===0?' active':''}" data-s="${i+1}">S${i+1}</button>`
    ).join('');
    row.querySelectorAll('.s-btn').forEach(b => b.addEventListener('click', () => {
        row.querySelectorAll('.s-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        activeSeason = +b.dataset.s;
        activeEp = 1;
        buildEps();
        loadPlayer();
    }));
    buildEps();
}

function buildEps() {
    const count = item.eps[activeSeason - 1] || 12;
    const row = document.getElementById('epRow');
    row.innerHTML = Array.from({length: count}, (_,i) =>
        `<button class="e-btn${i===0?' active':''}" data-e="${i+1}">E${i+1}</button>`
    ).join('');
    row.querySelectorAll('.e-btn').forEach(b => b.addEventListener('click', () => {
        row.querySelectorAll('.e-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        activeEp = +b.dataset.e;
        loadPlayer();
    }));
}

document.addEventListener('DOMContentLoaded', () => {
    // Read title from URL param
    const params = new URLSearchParams(location.search);
    const titleParam = decodeURIComponent(params.get('title') || '');
    const seasonParam = +params.get('s') || 1;
    const epParam    = +params.get('e') || 1;

    item = CATALOGUE.find(i => i.title === titleParam) || CATALOGUE[0];
    activeSeason = seasonParam;
    activeEp = epParam;

    // Set page title
    document.title = `${item.title} — SPCFlix`;
    document.getElementById('breadcrumbTitle').textContent = item.title;
    document.getElementById('playerTitle').textContent = item.title;

    const badgeEl = document.getElementById('playerBadge');
    badgeEl.textContent = item.type.toUpperCase();
    badgeEl.className = `badge badge-${item.type}`;
    document.getElementById('playerRating').textContent = `★ ${item.rating}`;
    document.getElementById('playerYear').textContent = item.year;
    document.getElementById('playerGenre').textContent = item.genre;
    document.getElementById('playerDesc').textContent = item.desc;

    // Episode picker for series/anime
    if (item.type !== 'movie') {
        document.getElementById('epSection').style.display = 'block';
        buildSeasons();
        // Activate correct season/ep buttons
        setTimeout(() => {
            const sBtn = document.querySelector(`.s-btn[data-s="${activeSeason}"]`);
            if (sBtn) { document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active')); sBtn.classList.add('active'); buildEps(); }
            const eBtn = document.querySelector(`.e-btn[data-e="${activeEp}"]`);
            if (eBtn) { document.querySelectorAll('.e-btn').forEach(b => b.classList.remove('active')); eBtn.classList.add('active'); }
        }, 50);
    }

    loadPlayer();

    // Fullscreen
    document.getElementById('btnFullscreen').addEventListener('click', () => {
        const wrap = document.querySelector('.player-iframe-wrap');
        if (wrap.requestFullscreen) wrap.requestFullscreen();
        else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
    });

    // Refresh
    document.getElementById('btnRefresh').addEventListener('click', loadPlayer);

    // Sidebar toggle — overlay style
    const sidebar = document.getElementById('sidebar');
    const overlay = document.querySelector('.sidebar-overlay');
    function openSidebar()  { sidebar.classList.add('flix-open'); overlay.classList.add('flix-active'); }
    function closeSidebar() { sidebar.classList.remove('flix-open'); overlay.classList.remove('flix-active'); }
    document.getElementById('menu-toggle').addEventListener('click', () => {
        sidebar.classList.contains('flix-open') ? closeSidebar() : openSidebar();
    });
    if (overlay) overlay.addEventListener('click', closeSidebar);
    sidebar.querySelectorAll('a').forEach(a => a.addEventListener('click', closeSidebar));
});
</script>

<!-- Lightweight settings/account button — shares the same localStorage
     settings as core.js (perf mode, reduce motion) so toggles made here
     or on the games pages stay in sync. -->
<script>
(function () {
    const DEFAULT_SETTINGS = { performanceMode: false, reduceMotion: false, capFps: false, imageQuality: 'auto' };
    function loadSettings() {
        try { return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem('spc_settings') || '{}') }; }
        catch (e) { return { ...DEFAULT_SETTINGS }; }
    }
    function saveSettings(s) { localStorage.setItem('spc_settings', JSON.stringify(s)); }
    let settings = loadSettings();

    function applySettings(s) {
        const root = document.documentElement;
        root.classList.toggle('perf-mode', !!s.performanceMode);
        root.classList.toggle('reduce-motion', !!s.reduceMotion);
    }
    applySettings(settings);

    const btn = document.createElement('button');
    btn.title = 'Settings';
    btn.setAttribute('aria-label', 'Open settings');
    btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
    btn.style.cssText = 'position:fixed;bottom:2rem;left:2rem;width:50px;height:50px;border-radius:50%;background:var(--bg-card,#1a1a24);color:#fff;border:1px solid var(--border,rgba(255,255,255,0.1));cursor:pointer;z-index:600;display:flex;align-items:center;justify-content:center;';

    const panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:5.5rem;left:2rem;width:270px;background:var(--bg-card,#1a1a24);border:1px solid var(--border,rgba(255,255,255,0.1));border-radius:12px;padding:1.1rem;z-index:601;display:none;box-shadow:0 10px 40px rgba(0,0,0,0.5);font-size:0.85rem;';
    panel.innerHTML = `
        <h3 style="margin:0 0 0.85rem;font-size:0.95rem;font-weight:700;">Settings</h3>
        <label style="display:flex;align-items:center;justify-content:space-between;gap:0.6rem;margin-bottom:0.75rem;cursor:pointer;">
            <span>Performance mode</span>
            <input type="checkbox" id="flixSetPerf" style="width:17px;height:17px;">
        </label>
        <label style="display:flex;align-items:center;justify-content:space-between;gap:0.6rem;margin-bottom:0.85rem;cursor:pointer;">
            <span>Reduce motion</span>
            <input type="checkbox" id="flixSetMotion" style="width:17px;height:17px;">
        </label>
        <div id="flixAccountLine" style="color:rgba(255,255,255,0.5);border-top:1px solid var(--border,rgba(255,255,255,0.1));padding-top:0.7rem;margin-bottom:0.6rem;">Signed in as —</div>
        <button id="flixLogoutBtn" style="width:100%;padding:0.5rem;border-radius:8px;border:1px solid rgba(229,9,20,0.5);background:rgba(229,9,20,0.12);color:#fca5a5;cursor:pointer;">Log Out</button>
    `;

    document.body.appendChild(btn);
    document.body.appendChild(panel);

    let open = false;
    btn.addEventListener('click', () => { open = !open; panel.style.display = open ? 'block' : 'none'; });
    document.addEventListener('click', (e) => {
        if (open && !panel.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
            open = false; panel.style.display = 'none';
        }
    });

    const perfCb = panel.querySelector('#flixSetPerf');
    const motionCb = panel.querySelector('#flixSetMotion');
    perfCb.checked = !!settings.performanceMode;
    motionCb.checked = !!settings.reduceMotion;
    perfCb.addEventListener('change', () => { settings.performanceMode = perfCb.checked; saveSettings(settings); applySettings(settings); });
    motionCb.addEventListener('change', () => { settings.reduceMotion = motionCb.checked; saveSettings(settings); applySettings(settings); });

    if (window.spcCurrentSessionUser) {
        panel.querySelector('#flixAccountLine').textContent = `Signed in as ${window.spcCurrentSessionUser.username}`;
    }
    document.addEventListener('spc-auth-ready', (e) => {
        panel.querySelector('#flixAccountLine').textContent = `Signed in as ${e.detail.username}`;
    });

    panel.querySelector('#flixLogoutBtn').addEventListener('click', () => {
        if (typeof window.spcLogout === 'function') window.spcLogout();
    });
})();
</script>
</body>
</html>
