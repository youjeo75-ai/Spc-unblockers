<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Game | Spc Unblockers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .breadcrumb {
            margin: 0 2rem 1rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            transition: var(--transition-fast);
        }

        .breadcrumb a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .breadcrumb span {
            opacity: 0.5;
        }

        .player-container {
            margin: 0 2rem 2rem;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
        }

        .game-description {
            padding: 0.5rem 1.5rem 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .player-container {
                margin: 0 1rem 1rem;
            }
            .iframe-wrapper {
                height: 60vh;
                min-height: 400px;
            }
            .player-controls {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
            .game-info-player {
                width: 100%;
            }
            .controls-right {
                width: 100%;
                justify-content: flex-end;
            }
            .breadcrumb {
                margin: 0 1rem 0.5rem;
            }
        }

        .iframe-wrapper {
            width: 100%;
            height: 70vh;
            min-height: 500px;
            background-color: #000;
            position: relative;
        }

        #gameIframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-controls {
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border);
        }

        .game-info-player h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .game-info-player span {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .controls-right {
            display: flex;
            gap: 1rem;
        }

        .btn-icon {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .btn-icon svg {
            transition: var(--transition-fast);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
        }

        .btn-icon:hover {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border-color: var(--primary);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-icon:hover svg {
            transform: scale(1.15);
            filter: drop-shadow(0 4px 8px rgba(255, 255, 255, 0.3));
        }

        .btn-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.2), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .btn-icon:hover::before {
            opacity: 1;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(139, 92, 246, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

            </nav>

        <!-- Main Content -->
        <main class="main-content">
            <div class="breadcrumb">
                <a href="index.html">Home</a>

            <header class="top-nav">

                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="user-actions" style="margin-left: auto;">
                </div>
            </header>

            <div class="player-container">
                <div class="iframe-wrapper" id="fullscreen-target">
                    <div class="loading-overlay" id="loadingOverlay">
                        <div class="spinner"></div>

                    <div class="game-description" id="gameDescription">Loading description...</div>
                    <div class="controls-right">
                        <button class="btn-icon" id="btnFavorite" title="Add to Favorites">

                        </button>

            <div class="sidebar-section">

                <div class="controls-grid">
                    <button class="control-btn" id="fullscreenBtn" title="Fullscreen">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>

                    <button class="control-btn" id="shareBtn" title="Share Game">

            </div>

            <div class="sidebar-section">
                <h3 class="section-title">Rate this Game</h3>
                <div class="rating-container" id="ratingContainer">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <p id="ratingStatus" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;"></p>
            </div>

            <div class="section-title">
                <h3>More Like This</h3>
