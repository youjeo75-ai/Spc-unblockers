<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Spc Unblockers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>window.SPC_API_BASE = window.SPC_API_BASE || 'https://spc-unblockers-backend.onrender.com';</script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .auth-box {
            width: 100%;
            max-width: 380px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
        }
        .auth-box h1 {
            font-size: 1.4rem;
            margin: 0 0 0.25rem;
            text-align: center;
        }
        .auth-box p.sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 0 0 1.5rem;
        }
        .auth-box label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
        }
        .auth-box input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            margin-bottom: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        .auth-box button[type="submit"] {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius-md);
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .auth-box button[type="submit"]:hover {
            transform: translateY(-2px);
        }
        .auth-box button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .switch-line {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 1.2rem;
            color: var(--text-muted);
        }
        .switch-line a {
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }
        .error-msg {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.4);
            color: #fca5a5;
            border-radius: var(--radius-md);
            padding: 0.6rem 0.8rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .banned-box {
            display: none;
            text-align: center;
        }
        .banned-box h1 { color: #f87171; }
    </style>
</head>
<body>
    <div class="auth-box" id="authBox">
        <h1 id="formTitle">Welcome Back</h1>
        <p class="sub" id="formSub">Sign in to access Spc Unblockers</p>

        <div class="error-msg" id="errorMsg"></div>

        <form id="authForm">
            <label for="username">Username</label>
            <input type="text" id="username" autocomplete="username" required minlength="3" maxlength="20">

            <label for="password">Password</label>
            <input type="password" id="password" autocomplete="current-password" required minlength="6">

            <button type="submit" id="submitBtn">Sign In</button>
        </form>

        <p class="switch-line">
            <span id="switchPrompt">Don't have an account?</span>
            <a id="switchLink">Sign up</a>
        </p>
    </div>

    <div class="auth-box banned-box" id="bannedBox">
        <h1>You are banned</h1>
        <p class="sub" id="banReason">No reason provided.</p>
    </div>

    <script>
        // Point this at wherever you deploy the backend (see render.yaml).
        // Example once deployed: 'https://spc-unblockers-backend.onrender.com'
        const API_BASE = window.SPC_API_BASE || 'http://localhost:3000';

        const form = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const formTitle = document.getElementById('formTitle');
        const formSub = document.getElementById('formSub');
        const switchPrompt = document.getElementById('switchPrompt');
        const switchLink = document.getElementById('switchLink');
        const authBox = document.getElementById('authBox');
        const bannedBox = document.getElementById('bannedBox');

        let mode = 'login'; // 'login' | 'signup'

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }
        function clearError() {
            errorMsg.style.display = 'none';
        }

        switchLink.addEventListener('click', () => {
            mode = mode === 'login' ? 'signup' : 'login';
            clearError();
            if (mode === 'signup') {
                formTitle.textContent = 'Create Account';
                formSub.textContent = 'Sign up to access Spc Unblockers';
                submitBtn.textContent = 'Sign Up';
                switchPrompt.textContent = 'Already have an account?';
                switchLink.textContent = 'Sign in';
            } else {
                formTitle.textContent = 'Welcome Back';
                formSub.textContent = 'Sign in to access Spc Unblockers';
                submitBtn.textContent = 'Sign In';
                switchPrompt.textContent = "Don't have an account?";
                switchLink.textContent = 'Sign up';
            }
        });

        function showBanned(reason) {
            authBox.style.display = 'none';
            bannedBox.style.display = 'block';
            document.getElementById('banReason').textContent = reason || 'No reason provided.';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearError();
            submitBtn.disabled = true;
            submitBtn.textContent = mode === 'login' ? 'Signing in...' : 'Signing up...';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE}/api/${mode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.status === 403 && data.banned) {
                    showBanned(data.reason);
                    return;
                }
                if (!res.ok) {
                    showError(data.error || 'Something went wrong.');
                    return;
                }

                // Success — go to the homepage.
                window.location.href = 'index.html';
            } catch (err) {
                showError('Could not reach the server. Try again in a moment.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = mode === 'login' ? 'Sign In' : 'Sign Up';
            }
        });

        // If already logged in, skip straight to the homepage.
        (async () => {
            try {
                const res = await fetch(`${API_BASE}/api/me`, { credentials: 'include' });
                if (res.ok) window.location.href = 'index.html';
            } catch (e) { /* backend not reachable yet — let them log in manually */ }
        })();
    </script>
</body>
</html>
